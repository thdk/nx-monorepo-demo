name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: write
  packages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  NX_VERBOSE_LOGGING: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version-commit-sha: ${{ steps.publish.outputs.version-commit-sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Setup git
        id: git
        uses: ./.github/actions/setup-git

      # This enables task distribution via Nx Cloud
      # Run this command as early as possible, before dependencies are installed
      # Learn more at https://nx.dev/ci/reference/nx-cloud-cli#npx-nxcloud-startcirun
      # Uncomment this line to enable task distribution
      # - run: npx nx-cloud start-ci-run --distribute-on="3 linux-medium-js" --stop-agents-after="build"

      - name: Setup node, install dependencies and configure nx
        uses: ./.github/actions/nx-setup-node

      - name: Setup Playwright
        uses: ./.github/actions/setup-playwright
        with:
          browsers: chromium

      - name: Lint package configurations
        run: pnpm exec nx syncpack

      # Prepend any command with "nx-cloud record --" to record its logs to Nx Cloud
      # - run: pnpm exec nx-cloud record -- echo Hello World
      # Nx Affected runs only tasks affected by the changes in this PR/commit. Learn more: https://nx.dev/ci/features/affected

      - name: Build lint test affected projects and prepare apps for containerization
        run: pnpm exec nx affected --targets lint test build e2e zip

      - name: Version
        run: |
          if [ "${{ steps.git.outputs.branch-name }}" == "main" ]; then
            pnpm exec nx release \
              --groups packages,apps \
              --dockerVersionScheme production \
              --skip-publish
          else
            pnpm exec nx release \
              --preid pr-${{ steps.git.outputs.commit-sha-short }} \
              --groups packages,apps \
              --dockerVersionScheme production \
              --skip-publish
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # TODO: version and store non container build artifacts (e.g. )

      - name: Authenticate GCP
        uses: './.github/actions/authenticate-gcp'

      - name: Publish
        id: publish
        run: |
          if [ "${{ steps.git.outputs.branch-name }}" == "main" ]; then
            pnpm exec nx release publish \
              --groups packages,apps \
              --tag latest

            git push --follow-tags
            echo "version-commit-sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          else
            pnpm exec nx release publish \
              --groups packages,apps \
              --tag pr-${{ steps.git.outputs.commit-sha-short }}
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Validate IaC
        if: ${{ github.ref != 'refs/heads/main' }}
        uses: ./.github/actions/nx-terraform
        with:
          dry-run: true
          affected-only: true
          configuration: development
  deploy:
    needs: [build]
    uses: ./.github/workflows/cd.yml
    if: ${{ github.ref == 'refs/heads/main' }}
    with:
      environment: development
      dry-run: false
      affected-only: true
      ref: ${{ needs.build.outputs.version-commit-sha }} # forward new ref so the next job can fetch it instead of using the ref that triggered the workflow!
    secrets: inherit
