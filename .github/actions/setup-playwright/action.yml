name: 'Setup Playwright'
description: 'Setup Playwright with caching'

inputs:
  browsers:
    description: 'Comma-separated list of browsers to install (e.g., chromium, firefox). Leave empty for all.'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Get Playwright version
      id: playwright-version
      shell: bash
      run: |
        PLAYWRIGHT_VERSION=$(pnpm exec playwright --version | awk '{print $2}')
        echo "PLAYWRIGHT_VERSION=$PLAYWRIGHT_VERSION" >> $GITHUB_ENV

    - name: Determine Browsers
      id: determine-browsers
      shell: bash
      run: |
        BROWSERS="${{ inputs.browsers }}"
        if [ -z "$BROWSERS" ]; then
          BROWSERS="all"
        else
          BROWSERS=$(echo "$BROWSERS" | tr ',' '\n' | sort | tr '\n' ',' | sed 's/,$//')
        fi
        echo "BROWSERS=$BROWSERS" >> $GITHUB_ENV

    - name: Cache Playwright
      id: playwright-cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.cache/ms-playwright
        key: playwright-v2-${{ runner.os }}-${{ env.PLAYWRIGHT_VERSION }}-${{ env.BROWSERS }}

    - name: Install Playwright system dependencies
      shell: bash
      run: pnpm exec playwright install-deps ${{ inputs.browsers }}

    - name: Install Playwright browsers
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        if [ -z "${{ inputs.browsers }}" ]; then
          pnpm exec playwright install
        else
          pnpm exec playwright install ${{ inputs.browsers }}
        fi
