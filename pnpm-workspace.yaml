verifyDepsBeforeRun: install

# Hard-link workspace packages so `pnpm deploy` can filter to a single app's
# actual graph instead of pulling every root dep. Required to use the non-legacy
# deploy mode that powers @thdk/nx-pnpm-deploy.
injectWorkspacePackages: true

packages:
  - 'apps/**'
  - 'packages/**'
  - 'tools/**'
  - 'scripts/*'
  - '!apps/**/out'
  - '!apps/**/dist/**'

allowBuilds:
  '@nestjs/core': false
  '@parcel/watcher': true
  '@swc/core': true
  esbuild: true
  less: true
  nx: true
  unrs-resolver: true
